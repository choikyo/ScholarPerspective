{% extends "base.html" %}

{% block title %}{{ title }} - Scholar Perspective{% endblock %}

{% block content %}
<article class="article-viewer">
    <div class="article-viewer-header">
        <a href="{{ url_for('publications') }}" class="back-link">&larr; Back to Publications</a>
        <span class="issue-label">{{ issue }}</span>
    </div>

    <div id="pdfLoading" class="pdf-loading">Loading article...</div>
    <div class="pdf-container" id="pdfContainer"></div>
</article>
{% endblock %}

{% block scripts %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const pdfUrl = "{{ url_for('serve_pdf', filepath=filepath) }}";
const container = document.getElementById('pdfContainer');
const loading = document.getElementById('pdfLoading');

async function renderPDF() {
    const pdf = await pdfjsLib.getDocument(pdfUrl).promise;
    loading.style.display = 'none';
    const containerWidth = container.clientWidth;
    const dpr = window.devicePixelRatio || 1;

    for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
        const page = await pdf.getPage(pageNum);
        const viewport = page.getViewport({ scale: 1 });
        const scale = (containerWidth / viewport.width) * dpr;
        const scaledViewport = page.getViewport({ scale: scale });

        const canvas = document.createElement('canvas');
        canvas.width = scaledViewport.width;
        canvas.height = scaledViewport.height;
        canvas.style.width = '100%';
        canvas.style.display = 'block';
        canvas.style.marginBottom = '12px';
        canvas.style.borderBottom = '3px solid #e1e4ed';
        container.appendChild(canvas);

        await page.render({
            canvasContext: canvas.getContext('2d'),
            viewport: scaledViewport
        }).promise;
    }
}

renderPDF();

// Disable right-click
document.addEventListener('contextmenu', function(e) {
    if (e.target.closest('.pdf-container')) {
        e.preventDefault();
    }
});

// Disable copy/print shortcuts
document.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && ['c','a','x','s','p'].includes(e.key)) {
        e.preventDefault();
    }
});

document.addEventListener('dragstart', function(e) {
    e.preventDefault();
});
</script>
{% endblock %}
